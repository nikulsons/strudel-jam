name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-strudel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone and build Strudel REPL
        run: |
          cd ..
          git clone --depth 1 https://github.com/tidalcycles/strudel.git
          cd strudel
          npm install
          npm run jsdoc-json
          cd website
          BASE_PATH="/strudel" npm run build
          cd ../../strudel-jam
          mkdir -p public/strudel
          cp -r ../strudel/website/dist/* public/strudel/

      - name: Upload Strudel build
        uses: actions/upload-artifact@v4
        with:
          name: strudel-repl
          path: public/strudel/
          retention-days: 1

  build-tauri:
    needs: build-strudel
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Download Strudel build
        uses: actions/download-artifact@v4
        with:
          name: strudel-repl
          path: public/strudel/

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Strudel Jam ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            **macOS**: Use the `.dmg` file. You may need to right-click and select "Open" the first time due to Gatekeeper.
            **Windows**: Use the `-setup.exe` installer.
            **Linux**: Use `.deb` for Debian/Ubuntu or `.AppImage` for other distros.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
