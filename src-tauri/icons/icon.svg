<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Tilde symbol ~ representing Strudel's cycle notation -->
  <text x="256" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="340" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central" opacity="0.95">~</text>
</svg>
